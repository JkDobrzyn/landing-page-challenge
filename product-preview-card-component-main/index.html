<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <title>Frontend Mentor | Product preview card component</title>
</head>
<body>

  <article class="card">
    <img 
      src="./images/image-product-desktop.jpg" 
      alt="Gabrielle Essence Eau De Parfum bottle" 
      class="card-image"
    >
    
    <div class="card-content">
      <p class="category">Perfume</p>
      
      <h1 class="product-name">Gabrielle Essence Eau De Parfum</h1>
      
      <p class="description">
        A floral, solar and voluptuous interpretation composed by Olivier Polge, 
        Perfumer-Creator for the House of CHANEL.
      </p>
      
      <div class="price-container">
        <span class="price-current">$149.99</span>
        <span class="price-original">$169.99</span>
      </div>
      
      <button class="button">
        <img src="./images/icon-cart.svg" alt="" aria-hidden="true" width="16" height="16">
        Add to Cart
      </button>
    </div>
  </article>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="https://github.com/JkDobrzyn/landing-page-challenge">Pablo</a>.
  </footer>
</body>
</html>
